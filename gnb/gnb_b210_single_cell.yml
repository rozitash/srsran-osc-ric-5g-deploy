# Configuration for a single gNB with one cell using USRP B210
gnb_id: 411
gnb_id_bit_length: 32

cu_cp:
  amf:
    addr: 10.53.1.2
    bind_addr: 10.53.1.1 # Host IP on the bridge, adjust if needed
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "99970"
            tai_slice_support_list:
              - sst: 1
  mobility:
    trigger_handover_from_measurements: false # Handover disabled for single cell

ru_sdr:
  device_driver: uhd
  device_args: type=b200,serial=34C78F0,num_recv_frames=256,num_send_frames=256
  clock: internal
  sync: internal
  srate: 15.36 # Reduced for stability periodically
  tx_gain: 70
  rx_gain: 70

cell_cfg:
  band: 78
  channel_bandwidth_MHz: 10
  common_scs: 30
  nof_antennas_dl: 1
  nof_antennas_ul: 1
  plmn: "99970"
  tac: 7
  pucch:
    nof_ue_res_harq_per_set: 1
    nof_cell_harq_pucch_res_sets: 1
    f1_nof_cyclic_shifts: 1
    f1_enable_occ: true
    f0_or_f1_nof_cell_res_sr: 1
    f2_or_f3_or_f4_nof_cell_res_csi: 1

cells:
  - pci: 2
    dl_arfcn: 632628 # Band 78
    prach:
      prach_root_sequence_index: 0

log:
  filename: /tmp/gnb.log
  all_level: info

metrics:
  autostart_stdout_metrics: true
  enable_verbose: true
  periodicity:
    du_report_period: 1000

e2:
  enable_cu_cp_e2: true
  enable_du_e2: true
  e2sm_kpm_enabled: true
  e2sm_rc_enabled: true
  addr: 127.0.0.1
  port: 36421
